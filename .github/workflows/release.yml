name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version number (e.g. 2.0.0)"
        required: true
        default: ""
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: Parse version
        id: version
        shell: pwsh
        run: |
          $manual = "${{ github.event.inputs.version }}".Trim()
          if ($manual) {
            $ver = $manual
          } elseif ("${{ github.ref }}" -match "^refs/tags/v(\d+\.\d+\.\d+)") {
            $ver = $matches[1]
          } else {
            $ver = "0.0.0"
          }
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Version: $ver"

      # ============================================================
      # Download external dependencies (all self-contained single files, no runtime deps)
      # ============================================================

      - name: Download yt-dlp.exe (standalone, bundles Python)
        shell: pwsh
        run: |
          $url = "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe"
          Write-Host "Downloading yt-dlp.exe..."
          Invoke-WebRequest -Uri $url -OutFile yt-dlp.exe -UseBasicParsing
          Write-Host "yt-dlp.exe: $([math]::Round((Get-Item yt-dlp.exe).Length / 1MB, 1)) MB"

      - name: Download ffmpeg.exe (BtbN static build, no DLL deps)
        shell: pwsh
        run: |
          Write-Host "Fetching latest ffmpeg release info from GitHub API..."
          $release = Invoke-RestMethod -Uri "https://api.github.com/repos/BtbN/FFmpeg-Builds/releases/latest" `
            -Headers @{ Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}" }

          # Static build: name like "ffmpeg-master-latest-win64-gpl.zip", NOT "*-shared*"
          $asset = $release.assets | Where-Object {
            $_.name -like "*win64*gpl*.zip" -and $_.name -notlike "*shared*"
          } | Select-Object -First 1
          if (-not $asset) {
            Write-Host "ERROR: Could not find static ffmpeg asset in latest release"
            Write-Host "Available assets: $($release.assets.name -join ', ')"
            exit 1
          }

          Write-Host "Downloading: $($asset.name) ($([math]::Round($asset.size / 1MB, 1)) MB)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile ffmpeg.zip -UseBasicParsing

          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $ffmpegExe = Get-ChildItem -Path ffmpeg_extract -Filter ffmpeg.exe -Recurse | Select-Object -First 1
          $sizeMB = [math]::Round((Get-Item $ffmpegExe.FullName).Length / 1MB, 1)

          # Static ffmpeg.exe should be > 80 MB; if much smaller it's likely a shared build launcher
          if ($sizeMB -lt 50) {
            Write-Host "ERROR: ffmpeg.exe is only $sizeMB MB — likely a shared build (requires DLLs)."
            Write-Host "Expected static build > 80 MB. Check BtbN release asset names:"
            Write-Host "$($release.assets.name -join "`n")"
            exit 1
          }

          Copy-Item $ffmpegExe.FullName ffmpeg.exe
          Write-Host "ffmpeg.exe: $sizeMB MB (static, standalone)"

      - name: Download node.exe (standalone)
        shell: pwsh
        run: |
          $nodeVer = "22.11.0"
          $url = "https://nodejs.org/dist/v$nodeVer/win-x64/node.exe"
          Write-Host "Downloading node.exe v$nodeVer..."
          Invoke-WebRequest -Uri $url -OutFile node.exe -UseBasicParsing
          Write-Host "node.exe: $([math]::Round((Get-Item node.exe).Length / 1MB, 1)) MB"

      # ============================================================
      # Build Go (static link, no runtime deps)
      # ============================================================

      - name: Build FetchTubeWeb.exe
        shell: pwsh
        run: |
          $env:CGO_ENABLED = "0"
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" -o FetchTubeWeb.exe .
          Write-Host "FetchTubeWeb.exe: $([math]::Round((Get-Item FetchTubeWeb.exe).Length / 1MB, 1)) MB"

      # ============================================================
      # Package (4 exes in one directory, unzip and run)
      # ============================================================

      - name: Create release package
        id: package
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $zipName = "FetchTubeWeb_v${ver}_win64.zip"
          $releaseDir = "FetchTubeWeb_v${ver}"

          New-Item -ItemType Directory -Force $releaseDir | Out-Null
          Copy-Item FetchTubeWeb.exe  $releaseDir\
          Copy-Item yt-dlp.exe              $releaseDir\
          Copy-Item ffmpeg.exe              $releaseDir\
          Copy-Item node.exe                $releaseDir\

          Write-Host "========== Release Package =========="
          Get-ChildItem $releaseDir | ForEach-Object {
            $mb = [math]::Round($_.Length / 1MB, 1)
            Write-Host "  $($_.Name)  $mb MB"
          }

          Compress-Archive -Path $releaseDir\* -DestinationPath $zipName -Force
          $zipSize = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
          Write-Host "--------------------------------------"
          Write-Host "  $zipName  ($zipSize MB)"
          Write-Host "======================================"

          "zip=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # ============================================================
      # Create GitHub Release
      # ============================================================

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          tag_name: v${{ steps.version.outputs.version }}
          files: ${{ steps.package.outputs.zip }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
