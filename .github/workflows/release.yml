name: Build & Release (Go)

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]*"
  workflow_dispatch:
    inputs:
      version:
        description: "版本号 (例如 1.0.0)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: go.sum

      - name: 解析版本号
        id: version
        shell: pwsh
        run: |
          $manual = "${{ github.event.inputs.version }}".Trim()
          if ($manual) {
            $ver = $manual
          } elseif ("${{ github.ref }}" -match "^refs/tags/v(\d+\.\d+\.\d+)") {
            $ver = $matches[1]
          } else {
            $ver = "0.0.0"
          }
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Version: $ver"

      # ---- 下载外部依赖 ----

      - name: 下载 yt-dlp.exe
        shell: pwsh
        run: |
          $url = "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe"
          Write-Host "Downloading yt-dlp.exe..."
          Invoke-WebRequest -Uri $url -OutFile yt-dlp.exe -UseBasicParsing
          Write-Host "yt-dlp.exe: $((Get-Item yt-dlp.exe).Length / 1MB) MB"

      - name: 下载 ffmpeg.exe
        shell: pwsh
        run: |
          $url = "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip"
          Write-Host "Downloading ffmpeg..."
          Invoke-WebRequest -Uri $url -OutFile ffmpeg.zip -UseBasicParsing
          # Extract ffmpeg.exe from zip (path: ffmpeg-*/bin/ffmpeg.exe)
          Expand-Archive ffmpeg.zip -DestinationPath ffmpeg_extract -Force
          $ffmpegExe = Get-ChildItem -Path ffmpeg_extract -Filter ffmpeg.exe -Recurse | Select-Object -First 1
          Copy-Item $ffmpegExe.FullName ffmpeg.exe
          Write-Host "ffmpeg.exe: $((Get-Item ffmpeg.exe).Length / 1MB) MB"

      - name: 下载 node.exe
        shell: pwsh
        run: |
          $nodeVer = "22.11.0"
          $url = "https://nodejs.org/dist/v$nodeVer/win-x64/node.exe"
          Write-Host "Downloading node.exe v$nodeVer..."
          Invoke-WebRequest -Uri $url -OutFile node.exe -UseBasicParsing
          Write-Host "node.exe: $((Get-Item node.exe).Length / 1MB) MB"

      # ---- 编译 Go ----

      - name: 编译 youtube-downloader.exe
        shell: pwsh
        run: |
          go build -ldflags="-s -w -X main.version=${{ steps.version.outputs.version }}" -o youtube-downloader.exe .
          Write-Host "youtube-downloader.exe: $((Get-Item youtube-downloader.exe).Length / 1MB) MB"

      # ---- 打包 ----

      - name: 创建发布包
        id: package
        shell: pwsh
        run: |
          $ver = "${{ steps.version.outputs.version }}"
          $zipName = "youtube-downloader_v${ver}_win64.zip"
          $releaseDir = "youtube-downloader_v${ver}"

          New-Item -ItemType Directory -Force $releaseDir | Out-Null
          Copy-Item youtube-downloader.exe  $releaseDir\
          Copy-Item yt-dlp.exe              $releaseDir\
          Copy-Item ffmpeg.exe              $releaseDir\
          Copy-Item node.exe                $releaseDir\

          Compress-Archive -Path $releaseDir\* -DestinationPath $zipName -Force

          $zipSize = [math]::Round((Get-Item $zipName).Length / 1MB, 1)
          Write-Host "Package: $zipName ($zipSize MB)"

          Get-ChildItem $releaseDir | ForEach-Object {
            $mb = [math]::Round($_.Length / 1MB, 1)
            Write-Host "  $($_.Name)  $mb MB"
          }

          "zip=$zipName" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      # ---- 发布 ----

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          name: "youtube-downloader v${{ steps.version.outputs.version }}"
          tag_name: v${{ steps.version.outputs.version }}
          files: ${{ steps.package.outputs.zip }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
