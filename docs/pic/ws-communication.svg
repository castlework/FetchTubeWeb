<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="550" viewBox="0 0 900 550">
<style>
  .box { filter: drop-shadow(0 2px 3px rgba(0,0,0,0.1)); }
  .title { font-weight: bold; }
</style>
<defs>

</defs>
<rect width="900" height="550" fill="#fafafa"/>
<text x="450" y="25" font-family="sans-serif" font-size="16" fill="#333" text-anchor="middle" font-weight="bold">WebSocket Real-time Progress Communication</text>
<rect x="30" y="60" width="200" height="60" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="2" class=""/>
<text x="130.0" y="82" font-family="sans-serif" font-size="13" fill="#1565c0" text-anchor="middle" font-weight="bold">Browser Client</text>
<text x="130.0" y="102" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle" font-weight="normal">app.js → WS.onMessage = onProgress</text>
<rect x="300" y="60" width="300" height="60" rx="8" fill="#e8f5e9" stroke="#2e7d32" stroke-width="2" class=""/>
<text x="450.0" y="82" font-family="sans-serif" font-size="13" fill="#2e7d32" text-anchor="middle" font-weight="bold">WebSocket Hub</text>
<text x="450.0" y="102" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle" font-weight="normal">goroutine loop: register / unregister / broadcast</text>
<rect x="670" y="60" width="200" height="60" rx="8" fill="#fff3e0" stroke="#e65100" stroke-width="2" class=""/>
<text x="770.0" y="82" font-family="sans-serif" font-size="13" fill="#e65100" text-anchor="middle" font-weight="bold">Download Goroutine</text>
<text x="770.0" y="102" font-family="sans-serif" font-size="10" fill="#666" text-anchor="middle" font-weight="normal">callback(data) → hub.Broadcast(data)</text>
<text x="130" y="150" font-family="sans-serif" font-size="11" fill="#333" text-anchor="middle" font-weight="normal">new WebSocket('/ws/progress')</text>
<text x="450" y="172" font-family="sans-serif" font-size="11" fill="#333" text-anchor="middle" font-weight="normal">upgrader.Upgrade(w, r)</text>
<text x="450" y="194" font-family="sans-serif" font-size="11" fill="#333" text-anchor="middle" font-weight="normal">register ← conn  (add to clients map)</text>
<text x="130" y="216" font-family="sans-serif" font-size="11" fill="#333" text-anchor="middle" font-weight="normal">console.log('[ws] connected')</text>
<text x="770" y="248" font-family="sans-serif" font-size="11" fill="#333" text-anchor="middle" font-weight="normal">callback(ProgressData{percent:45.3, ...})</text>
<text x="450" y="270" font-family="sans-serif" font-size="11" fill="#333" text-anchor="middle" font-weight="normal">hub.Broadcast(msg) → broadcast channel</text>
<text x="450" y="292" font-family="sans-serif" font-size="11" fill="#333" text-anchor="middle" font-weight="normal">for conn in clients: conn.WriteMessage(json)</text>
<text x="130" y="314" font-family="sans-serif" font-size="11" fill="#333" text-anchor="middle" font-weight="normal">onmessage → JSON.parse → onProgress(data)</text>
<text x="130" y="336" font-family="sans-serif" font-size="11" fill="#333" text-anchor="middle" font-weight="normal">update state.tasks[taskID] + renderQueue()</text>
<text x="130" y="368" font-family="sans-serif" font-size="11" fill="#333" text-anchor="middle" font-weight="normal">browser tab closed</text>
<text x="450" y="390" font-family="sans-serif" font-size="11" fill="#333" text-anchor="middle" font-weight="normal">read loop detects EOF → unregister ← conn</text>
<text x="450" y="412" font-family="sans-serif" font-size="11" fill="#333" text-anchor="middle" font-weight="normal">delete(clients, conn) + conn.Close()</text>
<rect x="30" y="340" width="840" height="100" rx="5" fill="#f5f5f5" stroke="#ddd" stroke-width="1" stroke-dasharray="5,5" class=""/>
<text x="50" y="365" font-family="sans-serif" font-size="12" fill="#333" text-anchor="start" font-weight="bold">Key Design Points:</text>
<text x="60" y="388" font-family="sans-serif" font-size="10" fill="#555" text-anchor="start" font-weight="normal">① Hub.run() is a single goroutine using select{} — all map mutations are serialized, no mutex needed for channels</text>
<text x="60" y="406" font-family="sans-serif" font-size="10" fill="#555" text-anchor="start" font-weight="normal">② broadcast channel has buffer=64 to avoid blocking download goroutines on brief send stalls</text>
<text x="60" y="424" font-family="sans-serif" font-size="10" fill="#555" text-anchor="start" font-weight="normal">③ JSON serialization happens once per broadcast (fan-out to N clients)</text>
<text x="60" y="442" font-family="sans-serif" font-size="10" fill="#555" text-anchor="start" font-weight="normal">④ Each client has a read-loop goroutine that detects disconnection and triggers cleanup</text>
</svg>